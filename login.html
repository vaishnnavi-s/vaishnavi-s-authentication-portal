<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vaishnavi S Auth Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 350px; border-radius: 12px;">

        <h3 class="text-center mb-3">
            <i class="bi bi-person-circle"></i> Login
        </h3>

        <form>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input 
                    type="email" 
                    class="form-control" 
                    name="email" 
                    placeholder="Enter your email" 
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input 
                    type="password" 
                    class="form-control" 
                    name="password" 
                    placeholder="Enter your password" 
                    required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>

        </form>

        <div class="text-center mt-3">

            <a href="forgot-password.html" class="d-block">
                Forgot Password?
            </a>

            <a href="register.html" class="d-block mt-1">
                Create Account
            </a>

            <a href="dashboard.html" class="d-block mt-1 text-muted">
                Go to Dashboard
            </a>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
