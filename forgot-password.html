<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Vaishnavi S</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 350px; border-radius: 12px;">

        <h3 class="text-center mb-3">
            <i class="bi bi-key"></i> Forgot Password
        </h3>

        <p class="text-muted text-center small">
            Enter your registered email to receive a reset link.
        </p>

        <form action="reset-password.html" method="POST">

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-control" 
                    placeholder="Enter your email"
                    required>
            </div>

            <button type="submit" class="btn btn-warning w-100">
                <i class="bi bi-envelope"></i> Send Reset Link
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="login.html">Back to Login</a><br>
            <a href="register.html" class="text-muted">Create Account</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
